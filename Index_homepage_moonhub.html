<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="./Style_homepage_moonhub.css">
    <title>Moon - Hub</title>
</head>

<body>

    <div id="title_logo_zone">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <!-- Nuvole vettoriali sparse a sinistra -->
        <img class="vector-cloud vc-l1" src="./assets/Images/NeonCloud.svg" alt="Cloud">
        <img class="vector-cloud vc-l2" src="./assets/Images/NeonCloud.svg" alt="Cloud">
        <img class="vector-cloud vc-l3" src="./assets/Images/NeonCloud.svg" alt="Cloud">

        <img id="img_logo" src="./assets/Images/Logo_moonhub.jpg" alt="Logo_moonhub">
        <h1 id="title_moonhub">MOONHUB</h1>

        <!-- Nuvole vettoriali sparse a destra -->
        <img class="vector-cloud vc-r1" src="./assets/Images/NeonCloud.svg" alt="Cloud">
        <img class="vector-cloud vc-r2" src="./assets/Images/NeonCloud.svg" alt="Cloud">
        <img class="vector-cloud vc-r3" src="./assets/Images/NeonCloud.svg" alt="Cloud">
    </div>

    <div class="GameList_zone">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
        <div id="particles-js"></div>

        <div class="contenitore">
            <div class="Box_Select_typeGame">
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
                <div class="cloud cloud-4"></div>
                <div class="cloud cloud-5"></div>
                <h3 class="GameList_title">Random Games</h3>
                <img class="Img_Select_typeGame" src="./assets/Images/ImgRandomGame.svg">
                <br>
                <button id="btnRandomGames" class="Buttons">Vai -></button>
            </div>

            <div class="Box_Select_typeGame">
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
                <div class="cloud cloud-4"></div>
                <div class="cloud cloud-5"></div>
                <h3 class="GameList_title">Single Player Games</h3>
                <img class="Img_Select_typeGame" src="./assets/Images/ImgSinglePlayerGame.svg">
                <br>
                <button id="btnSinglePlayerGames" class="Buttons">Vai -></button>
            </div>
            
            <div class="Box_Select_typeGame">
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
                <div class="cloud cloud-4"></div>
                <div class="cloud cloud-5"></div>
                <h3 class="GameList_title">Two Player Games</h3>
                <img class="Img_Select_typeGame" src="./assets/Images/ImgTwoPlayerGame.svg">
                <br>
                <button id="btnTwoPlayerGames" class="Buttons">Vai -></button>
            </div>
        </div>
    </div>

    <div class="Info_zone">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
        <p>For information, contact the following operators:</p>
        <ol>
            <li>
                Yngst_thaZuppa:
                <ul>
                    <li>Email: <a href="mailto:lazuppabagnata68@gmail.com">lazuppabagnata68@gmail.com</a></li>
                    <li>GitHub: <a href="https://github.com/YngstZuppa-maker3000">YngstZuppa-maker3000</a></li>
                </ul> 
            </li>
            <li>
                Elvettorato:
                <ul>
                    <li>Email: <a href="mailto:gabrlgithub.xda@gmail.com">gabrlgithub.xda@gmail.com</a></li>
                    <li>GitHub: <a href="https://github.com/Elvettorato">Elvettorato</a></li>
                </ul> 
            </li>
        </ol>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="app.js"></script>
    <script src="./Script_homepage_moonhub.js"></script>
</body>

</html>
