<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonGlow)" transform="translate(0, 30)">
    <!-- Player 1 Icon -->
    <circle cx="200" cy="60" r="25" fill="none" stroke="#00ffff" stroke-width="14"/>
    <path d="M140 130 C140 90, 260 90, 260 130" fill="none" stroke="#00ffff" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Controller Body -->
    <path d="M90 190 C90 140, 310 140, 310 190 C310 240, 350 280, 350 320 C350 360, 310 370, 280 320 C270 290, 130 290, 120 320 C90 370, 50 360, 50 320 C50 280, 90 240, 90 190 Z" fill="#1a0160" stroke="#00ffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- D-pad -->
    <path d="M110 215 h-20 v25 h20 v20 h25 v-20 h20 v-25 h-20 v-20 h-25 v20 Z" fill="none" stroke="#00ffff" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Buttons -->
    <circle cx="250" cy="240" r="14" fill="none" stroke="#00ffff" stroke-width="8"/>
    <circle cx="285" cy="205" r="14" fill="none" stroke="#00ffff" stroke-width="8"/>
  </g>
</svg>
