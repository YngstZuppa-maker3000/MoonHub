<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#neonGlow)" transform="translate(20, 20)">
    <!-- Die 2 (Yellow - back) -->
    <g transform="translate(230, 130) rotate(15)">
      <rect x="-70" y="-70" width="140" height="140" rx="20" fill="#1a0160" stroke="#ffff00" stroke-width="14"/>
      <!-- Dots (2) -->
      <circle cx="-30" cy="-30" r="14" fill="#ffff00"/>
      <circle cx="30" cy="30" r="14" fill="#ffff00"/>
    </g>
    
    <!-- Die 1 (Mint Green - front) -->
    <g transform="translate(130, 230) rotate(-10)">
      <rect x="-80" y="-80" width="160" height="160" rx="24" fill="#1a0160" stroke="#00ffaa" stroke-width="14"/>
      <!-- Dots (5) -->
      <circle cx="-40" cy="-40" r="14" fill="#00ffaa"/>
      <circle cx="40" cy="40" r="14" fill="#00ffaa"/>
      <circle cx="0" cy="0" r="14" fill="#00ffaa"/>
      <circle cx="-40" cy="40" r="14" fill="#00ffaa"/>
      <circle cx="40" cy="-40" r="14" fill="#00ffaa"/>
    </g>
  </g>
</svg>
